<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Peso Ideal</title>

<style>

body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#e3f2fd,#bbdefb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card {
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:320px;
text-align:center;
}

h1{
color:#1976d2;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:16px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.resultado{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#1976d2;
}

</style>

</head>

<body>

<div class="card">

<h1>Calculadora Peso Ideal</h1>

<input type="number" id="altura" placeholder="Ingresa tu altura (cm)">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function calcular(){

let altura = document.getElementById("altura").value;

if(altura === ""){
document.getElementById("resultado").innerHTML="Ingresa una altura válida";
return;
}

let peso = altura - 100;

document.getElementById("resultado").innerHTML =
"Tu peso ideal es: " + peso + " kg";

}

</script>

</body>
</html>
