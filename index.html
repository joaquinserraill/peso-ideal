<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitMetrics | Peso Ideal e IMC</title>

<link rel="icon" type="image/png" href="logo-fitmetrics.png.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;

background:
radial-gradient(circle at 20% 20%, #1e3a8a30, transparent 40%),
radial-gradient(circle at 80% 80%, #7c3aed30, transparent 40%),
linear-gradient(135deg,#020617,#020617,#020617);
}

.card{

width:100%;
max-width:420px;

background: rgba(255,255,255,0.06);

backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);

border:1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:32px;

box-shadow:
0 25px 60px rgba(0,0,0,0.7),
inset 0 1px 1px rgba(255,255,255,0.15);

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.titulo{

text-align:center;

font-size:28px;
font-weight:800;

letter-spacing:-0.5px;

margin-bottom:10px;

background: linear-gradient(180deg,#ffffff,#94a3b8);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.sub{

text-align:center;
color:#9ca3af;
margin-bottom:25px;
font-size:14px;

}

label{

display:block;
margin-bottom:8px;
font-weight:600;
font-size:14px;

}

input{

width:100%;
padding:16px;

border-radius:16px;

border:1px solid rgba(255,255,255,0.15);

background:rgba(255,255,255,0.05);

color:white;

margin-bottom:15px;

outline:none;

transition:.25s;

backdrop-filter: blur(10px);

}

input:focus{

border:1px solid #3b82f6;

box-shadow:
0 0 0 3px rgba(59,130,246,.25);

background:rgba(255,255,255,0.08);

}

button{

width:100%;
padding:16px;

border-radius:16px;

border:none;

font-weight:700;

cursor:pointer;

margin-top:10px;

background:linear-gradient(135deg,#3b82f6,#2563eb);

color:white;

transition:.25s;

box-shadow:
0 10px 30px rgba(59,130,246,.35);

}

button:hover{

transform:translateY(-2px);
box-shadow:
0 15px 40px rgba(59,130,246,.5);

}

.result{

margin-top:20px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.12);

padding:18px;

border-radius:20px;

text-align:center;

font-weight:600;

backdrop-filter: blur(10px);

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

margin-top:15px;

}

.stat{

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.12);

padding:16px;

border-radius:20px;

text-align:center;

backdrop-filter: blur(8px);

transition:.25s;

}

.stat:hover{

transform:translateY(-3px);

background:rgba(255,255,255,0.07);

}

.stat h4{

font-size:12px;
color:#9ca3af;
margin-bottom:6px;

}

.stat p{

font-weight:800;
font-size:19px;

}

.verde{color:#22c55e;}
.rojo{color:#ef4444;}
.naranja{color:#f59e0b;}

</style>

</head>

<body>

<div class="card">

<div class="titulo">
FitMetrics
</div>

<div class="sub">
Calcula tu peso ideal, tu IMC y tu rango saludable
</div>

<label>Altura en centímetros</label>
<input type="number" id="altura" placeholder="Ej: 174" min="1">

<label>Peso actual en kg</label>
<input type="number" id="peso" placeholder="Ej: 70" min="1">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado">
Ingresa tus datos
</div>

<div class="grid">

<div class="stat">
<h4>Peso Ideal</h4>
<p id="pesoIdeal">--</p>
</div>

<div class="stat">
<h4>IMC</h4>
<p id="imc">--</p>
</div>

<div class="stat">
<h4>Peso mínimo</h4>
<p id="pesoMin">--</p>
</div>

<div class="stat">
<h4>Peso máximo</h4>
<p id="pesoMax">--</p>
</div>

</div>

</div>

<script>

function calcular(){

let altura=parseFloat(document.getElementById("altura").value)
let peso=parseFloat(document.getElementById("peso").value)

let resultado=document.getElementById("resultado")
let pesoIdeal=document.getElementById("pesoIdeal")
let imc=document.getElementById("imc")
let pesoMin=document.getElementById("pesoMin")
let pesoMax=document.getElementById("pesoMax")

if(!altura || altura<=0){

resultado.innerHTML="Ingresa una altura válida"
return

}

let alturaM=altura/100

let ideal=altura-100
let min=18.5*(alturaM*alturaM)
let max=24.9*(alturaM*alturaM)

pesoIdeal.innerHTML=ideal.toFixed(1)+" kg"
pesoMin.innerHTML=min.toFixed(1)+" kg"
pesoMax.innerHTML=max.toFixed(1)+" kg"

if(!peso || peso<=0){

resultado.innerHTML="Peso ideal calculado correctamente"
return

}

let valorIMC=peso/(alturaM*alturaM)

imc.innerHTML=valorIMC.toFixed(1)

let estado=""

if(valorIMC<18.5){
estado="Bajo peso"
imc.className="rojo"
}

else if(valorIMC<25){
estado="Saludable"
imc.className="verde"
}

else if(valorIMC<30){
estado="Sobrepeso"
imc.className="naranja"
}

else{
estado="Obesidad"
imc.className="rojo"
}

resultado.innerHTML=
"Tu IMC es "+valorIMC.toFixed(1)+" ("+estado+")"

}

</script>

</body>
</html>
